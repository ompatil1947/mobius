name: scorer

on:
  push:
  pull_request:

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install score tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install pyyaml pytest

      - name: Score repository health
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import sys
          import yaml

          score = 0

          result = subprocess.run([sys.executable, '-m', 'pytest', '-q'], capture_output=True, text=True)
          if result.returncode == 0:
              score += 40

          build = Path('.github/workflows/build.yml')
          if build.exists():
              workflow = yaml.safe_load(build.read_text())
              names = [step.get('name', '') for step in workflow['jobs']['test']['steps']]
              expected = {'Set up Python', 'Install project', 'Install test tools', 'Build site', 'Run tests'}
              if expected.issubset(names):
                  install_step = next(step for step in workflow['jobs']['test']['steps'] if step.get('name') == 'Install project')
                  if 'pip install .' in install_step.get('run', ''):
                      score += 30

          workflow_check = Path('.github/workflows/workflow-check.yml')
          if workflow_check.exists():
              data = yaml.safe_load(workflow_check.read_text())
              names = [step.get('name', '') for step in data['jobs']['verify']['steps']]
              expected = {'Install workflow tools', 'Validate build workflow', 'Build reference site', 'Compare output'}
              if expected.issubset(names):
                  score += 30

          print(f'SCORE={score}')
          PY
