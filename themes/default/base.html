<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} · {{ site.title }}</title>
  <meta name="description" content="{{ page.metadata.get('description', site.description) }}">
  <style>
    :root { color-scheme: light; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #f6f7fb; color: #1b1f2a; }
    header, main, footer { max-width: 960px; margin: 0 auto; padding: 1.25rem; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    .brand { font-size: 1.4rem; font-weight: 700; color: inherit; text-decoration: none; }
    nav a { margin-right: 1rem; color: #3557d4; text-decoration: none; }
    nav a.active { font-weight: 700; }
    article, .hero { background: white; border-radius: 18px; box-shadow: 0 10px 35px rgba(31, 41, 55, 0.08); padding: 1.5rem; }
    .page--featured { border-left: 6px solid #3557d4; }
    .tag-list { color: #5a6474; font-size: 0.95rem; }
    footer { color: #6b7280; font-size: 0.95rem; }
    pre { overflow-x: auto; padding: 1rem; background: #111827; color: #f9fafb; border-radius: 12px; }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="{{ site_root|default('/') }}">{{ site.title }}</a>
    <nav>
      {% for item in navigation %}
      <a href="{{ item.url }}" class="{% if item.slug == page.slug %}active{% endif %}">{{ item.title }}</a>
      {% endfor %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <p>{{ site.description }}</p>
  </footer>
</body>
</html>
